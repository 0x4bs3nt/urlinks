<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" stop-opacity="1" />
      <stop offset="100%" stop-color="#181825" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.6" />
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)" />

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#8b5cf6" fill-opacity="0.05" />
  <circle cx="1100" cy="530" r="250" fill="#8b5cf6" fill-opacity="0.05" />

  <!-- Logo -->
  <rect x="100" y="215" width="120" height="120" rx="24" fill="url(#logo-gradient)" />
  <text x="160" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="white" text-anchor="middle">F</text>

  <!-- freetree text -->
  <text x="250" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="white">freetree</text>

  <!-- Subtitle -->
  <text x="100" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="500" fill="#a6a6b8">Free &amp; Open Source Link-in-Bio Tool</text>
</svg>
