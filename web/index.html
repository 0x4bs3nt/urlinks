<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

        <link rel="icon" href="public/favicon.svg" type="image/x-icon" />
        <link rel="icon" href="public/favicon.svg" type="image/x-icon" media="(prefers-color-scheme: light)" />
        <link rel="icon" href="public/favicon-dark.svg" type="image/x-icon" media="(prefers-color-scheme: dark)" />

        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

        <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png" />
        <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Urlinks - Free & Open Source Link-in-Bio Tool</title>
        <meta
            name="description"
            content="The completely free and open source link-in-bio tool. Unlimited links, custom themes, analytics, and more. No paywalls, no premium plans."
        />
        <meta name="keywords" content="link in bio, social media links, bio links" />
        <meta name="author" content="urlinks" />
        <meta name="theme-color" content="#000000" />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://urlinks.app/" />
        <meta property="og:title" content="Urlinks - Free & Open Source Link-in-Bio Tool" />
        <meta
            property="og:description"
            content="The completely free and open source Link-in-Bio tool. Unlimited links, custom themes, analytics, and more. No paywalls, no premium plans."
        />
        <meta property="og:image" content="https://urlinks.app/og-image.png" />

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:url" content="https://urlinks.app/" />
        <meta property="twitter:title" content="Urlinks - Free & Open Source Link-in-Bio Tool" />
        <meta
            property="twitter:description"
            content="The completely free and open source Link-in-Bio tool. Unlimited links, custom themes, analytics, and more. No paywalls, no premium plans."
        />
        <meta property="twitter:image" content="https://urlinks.app/og-image.png" />

        <link rel="canonical" href="https://urlinks.app/" />
        <link rel="stylesheet" href="src/index.css" />
    </head>
    <body>
        <div id="root"></div>

        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
