<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Geist:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <link rel="icon" href="public/favicon.svg" type="image/x-icon" />
        <link rel="icon" href="public/favicon.svg" type="image/x-icon" media="(prefers-color-scheme: light)" />
        <link rel="icon" href="public/favicon-dark.svg" type="image/x-icon" media="(prefers-color-scheme: dark)" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Urlinks - Free & Open Source Link-in-Bio Tool</title>
        <meta
            name="description"
            content="The completely free and open source link-in-bio tool. Unlimited links, custom themes, analytics, and more. No paywalls, no premium plans."
        />
        <meta name="keywords" content="link in bio, social media links, bio links" />
        <meta name="author" content="urlinks" />
        <meta name="theme-color" content="#000000" />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://geturlinks.app/" />
        <meta property="og:title" content="Urlinks - Free & Open Source Link-in-Bio Tool" />
        <meta
            property="og:description"
            content="The completely free and open source Link-in-Bio tool. Unlimited links, custom themes, analytics, and more. No paywalls, no premium plans."
        />
        <meta property="og:image" content="https://geturlinks.app/og-image.png" />

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:url" content="https://geturlinks.app/" />
        <meta property="twitter:title" content="Urlinks - Free & Open Source Link-in-Bio Tool" />
        <meta
            property="twitter:description"
            content="The completely free and open source Link-in-Bio tool. Unlimited links, custom themes, analytics, and more. No paywalls, no premium plans."
        />
        <meta property="twitter:image" content="https://geturlinks.app/og-image.png" />

        <link rel="canonical" href="https://geturlinks.app/" />

        <style>
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                padding: 0;
            }

            /* Light mode (default) */
            #root {
                background-color: #ffffff;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0;
                padding: 0;
            }
            #header {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                gap: 24px;
                padding: 24px;
                max-width: 100%;
                width: 100%;
            }
            #header img {
                height: 48px;
                width: auto;
                max-width: 100%;
            }
            #header p {
                color: #000000;
                font-family: 'Geist', sans-serif;
                font-size: 14px;
                font-weight: 500;
                margin: 0;
            }

            /* Dark mode */
            @media (prefers-color-scheme: dark) {
                #root {
                    background-color: #000000;
                }
                #header img {
                    filter: brightness(0) invert(1);
                }
                #header p {
                    color: #ffffff;
                }
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div id="header">
                <img src="public/urlinks.svg" alt="Urlinks" />
                <p>Free & Open Source Link-in-Bio Tool - Coming soon</p>
            </div>
        </div>

        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
